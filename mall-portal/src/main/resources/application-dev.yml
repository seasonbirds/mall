server:
  port: 8085

spring:
  shardingsphere:
    datasource:
      names: ds0
      ds0:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: root
        initial-size: 5
        min-idle: 10
        max-active: 20
    rules:
      sharding:
        tables:
          oms_order:
            actual-data-nodes: ds0.oms_order_$->{0..9}
            table-strategy:
              standard:
                sharding-column: order_sn
                sharding-algorithm-name: order-sn-mod
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          oms_order_item:
            actual-data-nodes: ds0.oms_order_item_$->{0..9}
            table-strategy:
              standard:
                sharding-column: order_sn
                sharding-algorithm-name: order-sn-mod
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
        sharding-algorithms:
          order-sn-mod:
            type: ORDER_SN_MOD
            props:
              sharding-count: 10
        key-generators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: 1
    props:
      sql-show: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: mall-port
  redis:
    host: localhost # Redis服务器地址
    database: 0 # Redis数据库索引（默认为0）
    port: 6379 # Redis服务器连接端口
    password: # Redis服务器连接密码（默认为空）
    timeout: 300ms # 连接超时时间（毫秒）
  rabbitmq:
    host: localhost
    port: 5672
    virtual-host: /mall
    username: mall
    password: mall

logging:
  level:
    root: info
    com.macro.mall: debug

logstash:
  host: localhost
  enableInnerLog: false

alipay:
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  appId: your appId
  alipayPublicKey: your alipayPublicKey
  appPrivateKey: your appPrivateKey
  returnUrl: http://localhost:8060/#/pages/money/paySuccess
  notifyUrl:
