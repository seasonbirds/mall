spring:
  shardingsphere:
    datasource:
      names: ds0
      ds0:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: 123456
        initial-size: 5
        min-idle: 10
        max-active: 20
    rules:
      sharding:
        tables:
          oms_order:
            actual-data-nodes: ds0.oms_order_$->{0..9}
            table-strategy:
              standard:
                sharding-column: order_sn
                sharding-algorithm-name: order-sn-mod
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
          oms_order_item:
            actual-data-nodes: ds0.oms_order_item_$->{0..9}
            table-strategy:
              standard:
                sharding-column: order_sn
                sharding-algorithm-name: order-sn-mod
            key-generate-strategy:
              column: id
              key-generator-name: snowflake
        sharding-algorithms:
          order-sn-mod:
            type: CLASS_BASED
            props:
              strategy: STANDARD
              algorithm-class-name: com.macro.mall.common.sharding.OrderSnShardingAlgorithm
        key-generators:
          snowflake:
            type: SNOWFLAKE
            props:
              worker-id: 1
    props:
      sql-show: true
  redis:
    host: localhost # Redis服务器地址
    database: 0 # Redis数据库索引（默认为0）
    port: 6379 # Redis服务器连接端口
    password: # Redis服务器连接密码（默认为空）
    timeout: 300ms # 连接超时时间（毫秒）

minio:
  endpoint: http://localhost:9000 #MinIO服务所在地址
  bucketName: mall #存储桶名称
  accessKey: minioadmin #访问的key
  secretKey: minioadmin #访问的秘钥

logging:
  level:
    root: info
    com.macro.mall: debug

logstash:
  host: localhost
  enableInnerLog: false
